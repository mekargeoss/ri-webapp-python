<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Demo Web Application using Mekarge A3</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, sans-serif; padding: 2rem; }
      .card { max-width: 720px; margin: 0 auto; padding: 1.5rem; border: 1px solid #ddd; border-radius: 12px; }
      .btn { display: inline-block; padding: 0.6rem 1rem; border-radius: 8px; text-decoration: none; border: 1px solid #333; }
      .row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: end; margin: 1rem 0 1.5rem; }
      label { display: block; font-size: 0.9rem; margin-bottom: 0.25rem; }
      input[type="text"] { padding: 0.5rem 0.6rem; border-radius: 8px; border: 1px solid #bbb; min-width: 220px; }
      pre { background: #f6f8fa; padding: 1rem; border-radius: 8px; overflow: auto; }
      .muted { color: #666; }
    </style>
  </head>
  <body>
    <div class="card">
      {% block body %}{% endblock %}
    </div>
    {% block page_scripts %}{% endblock %}
  </body>
</html>
