{% extends "base.html" %}
{% block body %}
<h1>User Claims</h1>
{% if user %}
  <pre>{{ user | tojson(indent=2) }}</pre>
  <p><a class="btn" href="/">Back</a></p>
{% else %}
  <p class="muted">No User claims matching Claim Locale.</p>
  <p><a class="btn" href="/">Home</a></p>
{% endif %}
{% endblock %}
